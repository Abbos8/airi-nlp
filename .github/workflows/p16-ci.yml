name: P16 - CI

on:
  push:
    paths:
      - "deployment/p16/**"
      - "capstone/modules/m08_gru_lstm_classifier.py"
      - "practices/d14_checkpoints/uz_sentiment_mini.jsonl"
      - "render.yaml"
      - ".github/workflows/p16-*.yml"
  pull_request:
    paths:
      - "deployment/p16/**"
      - "capstone/modules/m08_gru_lstm_classifier.py"
      - "practices/d14_checkpoints/uz_sentiment_mini.jsonl"
      - "render.yaml"
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: deployment/p16/requirements-dev.txt
      - name: Install test dependencies
        run: python -m pip install -r deployment/p16/requirements-dev.txt
      - name: Build deployment image
        run: docker build -t p16-sentiment:ci deployment/p16
