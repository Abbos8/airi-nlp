name: P16 - CT train LSTM candidate

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: LSTM training epochs
        required: true
        default: "8"
      model_version:
        description: Candidate model version
        required: true
        default: "candidate-v2"

permissions:
  contents: read

jobs:
  train-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: deployment/p16/requirements-training.txt
      - name: Install training dependencies
        run: python -m pip install -r deployment/p16/requirements-training.txt
      - name: Train candidate from the capstone LSTM
        run: >-
          python deployment/p16/training/train_lstm.py
          --epochs "${{ inputs.epochs }}"
          --model-version "${{ inputs.model_version }}"
          --output /tmp/lstm-candidate
      - name: Apply quality gate
        run: >-
          python deployment/p16/scripts/check_quality.py
          /tmp/lstm-candidate/metrics.json
          --min-f1 0.70 --max-latency-ms 100
      - name: Preserve approved candidate for review
        uses: actions/upload-artifact@v4
        with:
          name: p16-lstm-${{ inputs.model_version }}
          path: /tmp/lstm-candidate
          retention-days: 7
      - name: Explain promotion step
        run: |
          echo "Quality gate passed. Download the artifact, replace deployment/p16/artifacts/lstm-v1, and commit it."
          echo "CI verifies that commit; Render deploys it only after the checks pass."
